[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

monitor_speed = 115200
upload_speed = 460800

; Partición grande para apps con cámara
board_build.partitions = huge_app.csv

; Sistema de archivos SPIFFS
board_build.filesystem = littlefs

; Librerías necesarias
lib_deps = 
    NTPClient
    WiFiManager
